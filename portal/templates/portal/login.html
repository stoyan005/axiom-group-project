{% load static %}
<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Sky Engineering | Login</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500&family=Istok+Web&family=Inter:wght@600;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="{% static 'css/style.css' %}" />
	</head>
	<body>
		<div class="login-wrapper">
			<div class="background-container">
				<img src="{% static 'images/login.jpg' %}" alt="Studio Background" />
			</div>

			<aside class="auth-panel">
				<nav class="auth-nav">
					<div class="nav-item">SIGN UP</div>
					<div class="nav-item active">
						LOGIN
						<div class="active-indicator"></div>
					</div>
				</nav>

				<div class="form-wrapper">
					<div class="logo-area">
						<img
							src="{% static 'images/sky_logo.jpg' %}"
							class="main-logo"
							alt="Sky Logo"
						/>
					</div>

					<form method="POST" class="login-form">
						{% csrf_token %}

						<div class="input-container">
							<label class="field-label">Email Address</label>
							<div class="input-field">
								<input type="email" name="email" required />
								<span class="field-icon email-icon"></span>
							</div>
						</div>

						<div class="input-container">
							<label class="field-label">Password</label>
							<div class="input-field">
								<input type="password" name="password" required />
								<span class="field-icon eye-icon"></span>
							</div>
						</div>

						<div class="form-utilities">
							<label class="remember-box">
								<input type="checkbox" name="remember" />
								<span>Remember me</span>
							</label>
							<a href="#" class="forgot-link">Forgot Password?</a>
						</div>

						<div class="form-actions">
							<button type="submit" class="primary-btn">Login</button>
							<a href="#" class="help-link">Need help logging in?</a>
						</div>
					</form>
				</div>

				<footer class="footer-note">© 2026 Sky Engineering. All Rights Reserved</footer>
			</aside>
		</div>
	</body>
</html>

<style>
	/* Base Resets */
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}

	body,
	html {
		width: 1920px;
		height: 1080px;
		overflow: hidden;
	}

	.login-wrapper {
		position: relative;
		width: 100%;
		height: 90%;
	}

	/* Background */
	.background-container {
		position: absolute;
		inset: 0;
		z-index: 1;
	}

	.background-container img {
		width: 100%;
		height: 100%;
		object-fit: cover;
	}

	/* Side Panel */
	.auth-panel {
		position: absolute;
		width: 620px;
		height: 1080px;
		right: 0;
		top: 0;
		background: #f8fafc;
		border-radius: 32px 0 0 32px;
		z-index: 2;
		display: flex;
		flex-direction: column;
		align-items: center;
		padding-top: 160px;
	}

	/* Navigation */
	.auth-nav {
		position: absolute;
		top: 0;
		left: 0;
		display: flex;
		width: 100%;
		height: 65px;
	}

	.nav-item {
		flex: 1;
		display: flex;
		justify-content: center;
		align-items: center;
		font-family: 'Inter', sans-serif;
		font-weight: 800;
		font-size: 18px;
		background: #ffffff;
		cursor: pointer;
	}

	.nav-item.active {
		background: #f2f2f2;
		font-weight: 600;
		position: relative;
	}

	.active-indicator {
		position: absolute;
		bottom: 0;
		width: 100%;
		height: 3px;
		background: linear-gradient(90deg, #ff6a00 0%, #f107a3 50%, #7b2ff7 100%);
		box-shadow: 0px 5px 8px rgba(0, 0, 0, 0.25);
	}

	/* Form Styling */
	.form-wrapper {
		width: 524px;
		display: flex;
		flex-direction: column;
		gap: 80px;
	}

	.logo-area {
		text-align: center;
	}

	.main-logo {
		width: 143px;
		filter: drop-shadow(0px 5px 10px #a8a8a8);
	}

	.login-form {
		display: flex;
		flex-direction: column;
		gap: 20px;
	}

	.input-container {
		display: flex;
		flex-direction: column;
		gap: 8px;
	}

	.field-label {
		font-family: 'Ubuntu', sans-serif;
		font-size: 20px;
	}

	.input-field {
		height: 48px;
		background: #ffffff;
		border-radius: 15px;
		box-shadow: 2px 3px 10px rgba(0, 0, 0, 0.25);
		display: flex;
		align-items: center;
		padding: 0 16px;
	}

	.input-field input {
		flex: 1;
		border: none;
		outline: none;
		font-size: 18px;
	}

	.field-icon {
		width: 24px;
		height: 24px;
		background: #c2c2c2;
	}

	/* Utils & Actions */
	.form-utilities {
		display: flex;
		justify-content: space-between;
		font-family: 'Istok Web', sans-serif;
		font-size: 20px;
	}

	.forgot-link {
		color: #006fff;
		text-decoration: none;
	}

	.primary-btn {
		width: 100%;
		height: 57px;
		background: #802df4;
		color: #fff;
		border: none;
		border-radius: 15px;
		font-family: 'Ubuntu';
		font-size: 20px;
		font-weight: 500;
		cursor: pointer;
	}

	.help-link {
		display: block;
		text-align: center;
		margin-top: 24px;
		font-family: 'Istok Web';
		color: #006fff;
		text-decoration: none;
	}

	.footer-note {
		margin-top: auto;
		padding-bottom: 20px;
		font-family: 'Ubuntu';
		color: #5c5c5c;
		font-size: 18px;
	}
</style>

{% load static %}
<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sky Engineering | Authentication</title>
		<link rel="stylesheet" href="{% static 'css/auth.css' %}" />
		<style>
			:root {
				--bg-image: url("{% static 'images/login.jpg' %}");
			}
		</style>
	</head>
	<body>
		<div class="auth-container">
			<div class="image-section"></div>

			<div class="form-section" id="form-parent">
				<div class="tabs-container">
					<button
						type="button"
						id="tab-signup"
						class="tab-btn active"
						onclick="switchMode('signup')"
					>
						Sign Up
					</button>
					<button
						type="button"
						id="tab-login"
						class="tab-btn"
						onclick="switchMode('login')"
					>
						Login
					</button>
					<div class="tab-indicator" id="indicator"></div>
				</div>

				<div class="logo-container">
					<img src="{% static 'images/sky_logo.jpg' %}" alt="background" />
				</div>

				<div class="forms-wrapper">
					<form id="signup-form" class="auth-form" method="POST" action="">
						{% csrf_token %}
						<div class="name-row">
							<div class="form-group">
								<label>First Name<span class="required">*</span></label>
								<input type="text" name="first_name" required />
							</div>
							<div class="form-group">
								<label>Last Name<span class="required">*</span></label>
								<input type="text" name="last_name" required />
							</div>
						</div>
						<div class="form-group">
							<label>Email Address<span class="required">*</span></label>
							<input type="email" name="email" required />
						</div>
						<div class="form-group">
							<label>Password<span class="required">*</span></label>
							<input type="password" name="password" required />
						</div>
						<div class="form-group">
							<label>Department / Team<span class="required">*</span></label>
							<input type="text" name="department" required />
						</div>
						<button type="submit" class="submit-btn">Sign Up</button>
						<a href="#" class="help-link">Need help signing up?</a>
					</form>

					<form id="login-form" class="auth-form hidden" method="POST" action="">
						{% csrf_token %}
						<div class="form-group">
							<label>Email Address</label>
							<input type="email" name="login_email" />
						</div>
						<div class="form-group">
							<label>Password</label>
							<input type="password" name="login_password" />
						</div>
						<div
							style="
								display: flex;
								justify-content: space-between;
								align-items: center;
								font-size: 11px;
								margin-top: -5px;
							"
						>
							<label
								style="
									font-weight: normal;
									display: flex;
									align-items: center;
									gap: 5px;
								"
							>
								<input type="checkbox" style="width: auto" /> Remember me
							</label>
							<a href="#" style="color: #3b82f6; text-decoration: none"
								>Forgot Password?</a
							>
						</div>
						<div style="height: 80px"></div>
						<button type="submit" class="submit-btn">Login</button>
						<a href="#" class="help-link">Need help logging in?</a>
					</form>
				</div>

				<footer>© 2026 Sky Engineering. All Rights Reserved</footer>
			</div>
		</div>
		<script src="{% static 'js/auth.js' %}"></script>
	</body>
</html>

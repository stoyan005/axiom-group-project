{% extends 'base.html' %}

{% block content %}
<div class="detail-card">
    <h1 class="page-title">Email Team</h1>

    <p style="margin-bottom: 8px;">Team: <strong>{{ team.name }}</strong></p>
    <p style="margin-bottom: 20px;">Email will be sent to: <strong>{{ team.manager_email }}</strong></p>

    <form method="post" class="styled-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="{{ form.subject.id_for_label }}">Subject</label>
            {{ form.subject }}
        </div>

        <div class="form-group">
            <label for="{{ form.message.id_for_label }}">Message</label>
            {{ form.message }}
        </div>

        <div class="link-row">
            <button type="submit" class="btn">Send Email</button>
            <a href="{% url 'team_detail' team.id %}" class="btn">Back</a>
        </div>
    </form>
</div>
{% endblock %}

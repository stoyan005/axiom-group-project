{% extends 'base.html' %}

{% block content %}
<div class="detail-card">
    <h1 class="page-title">Schedule Meeting</h1>
    <p style="margin-bottom: 20px;">Team: <strong>{{ team.name }}</strong></p>

    <form method="post" class="styled-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="{{ form.title.id_for_label }}">Title</label>
            {{ form.title }}
        </div>

        <div class="form-group">
            <label for="{{ form.date.id_for_label }}">Date</label>
            {{ form.date }}
        </div>

        <div class="form-group">
            <label for="{{ form.time.id_for_label }}">Time</label>
            {{ form.time }}
        </div>

        <div class="form-group">
            <label for="{{ form.platform.id_for_label }}">Platform</label>
            {{ form.platform }}
        </div>

        <div class="form-group">
            <label for="{{ form.message.id_for_label }}">Message</label>
            {{ form.message }}
        </div>

        <div class="link-row">
            <button type="submit" class="btn">Save Meeting</button>
            <a href="{% url 'team_detail' team.id %}" class="btn">Back</a>
        </div>
    </form>
</div>
{% endblock %}


<!-- loads the django static file system to use CSS/JS-->
{% load static %}
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- shows the title-->
    <title>{{ page_title|default:"Sky Teams Portal" }}</title>
    <!-- links with the CSS stylesheet stored in static folder-->
    <link rel="stylesheet" href="{% static 'css/base.css' %}"><!--base-->
    <link rel="stylesheet" href="{% static 'css/teams.css' %}"><!--teams-->
    <link rel="stylesheet" href="{% static 'css/forms.css' %}"><!--forms-->
    <link rel="stylesheet" href="{% static 'css/darkmode.css' %}"><!--darkmode-->
</head>
<body>
    <div class="layout"> <!-- Main layout wrapper -->
        <aside class="sidebar"><!-- Sidebar navigation -->
            <div class="logo">sky</div><!-- Logo text -->
            <nav>
                <!-- Navigation links with active highlighting based on current URL -->
                <a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="{% url 'team_list' %}" class="{% if '/teams/' in request.path %}active{% endif %}">Teams</a>
                <a href="#" class="{% if '/organisation/' in request.path %}active{% endif %}">Organisation</a>
                <a href="#" class="{% if '/messages/' in request.path %}active{% endif %}">Messages</a>
                <a href="#" class="{% if '/calendar/' in request.path %}active{% endif %}">Calendar</a>
                <a href="#" class="{% if '/performance/' in request.path %}active{% endif %}">Performance</a>
            </nav>
        </aside>
        <!-- main content -->
        <main class="main">
            <header class="topbar">
                <input type="text" placeholder="Search teams, members or locations..." class="top-search">

                <div class="top-icons">
                    <button id="theme-toggle" class="icon-btn" type="button">🌙</button>
                    <span>🔔</span><!-- # Notifications icon not working as havent added yet-->
                    <span>👤</span><!-- # User profile icon not working as havent added yet -->
                </div>
            </header>

            <section class="content">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>
    <!-- theme button -->
    <script>
    const toggleBtn = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        if (toggleBtn) {
            toggleBtn.textContent = '☀️';
        }
    }

    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');

            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                toggleBtn.textContent = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                toggleBtn.textContent = '🌙';
            }
        });
    }
</script>
</body>
</html>
